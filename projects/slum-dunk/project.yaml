name: "slum-dunk"
type: "tierlist"
topic: "湘北对海南，从夯到拉排名"
language: zh
resolution: "1920x1080"
fps: 24
tts_voice: zh-CN-XiaoxiaoNeural

tierlist:
  background: ".cursor/skills/assemble-video/assets/tierlist_bg.png"
  label_width_ratio: 0.127

tiers:
  - id: "hang"
    label: "夯"
  - id: "top"
    label: "顶级"
  - id: "rsr"
    label: "人上人"
  - id: "npc"
    label: "NPC"
  - id: "la"
    label: "拉完了"

intro:
  text: "湘北对海南，从"夯"到"拉"排名。本次排名将结合比赛表现，以及井上手稿综合判定。没看过的朋友请自行暂停观看。"
  audio: "audio/intro.mp3"

contestants:
  - index: 1
    name: "帝王牧绅一"
    keywords: "Akira Sendoh basketball anime Slam Dunk"
    tier: "hang"
    text: |
      首先是帝王牧绅一，30分且三双达成。
      整场比赛，阿牧的表现无可挑剔，进攻端所向披靡，单防根本没人拦得住他。
      即使湘北派出赤木樱木两大内线，肌肉牧照样能将球打进。
      不仅自己能得分，还能带动队友拿分，10次以上的助攻数据就是最好的证明。
      逼得安西只好使出整部漫画里最夸张的四盯一大法，全力压制帝王牧。
      而阿牧在防守端的贡献，完全不亚于进攻端。
      他能从一号位防到五号位，湘北五虎都受到过他的"关照"。
      协防也非常积极，哪里有漏洞他就堵哪里。
      10个篮板以上的数据，甚至可能超过了队里的中锋高砂。
      凭借攻防两端的完美表现，阿牧给个"夯"，一点毛病没有。

  - index: 2
    name: "赤木刚宪"
    keywords: "Takenori Akagi basketball anime Slam Dunk center"
    tier: "hang"
    text: |
      接下来是湘北队长赤木，33分、15板、2助攻、4盖帽。
      海南战是其个人生涯最高光的一战。
      可以说这一战将赤木积压多年的情绪彻底宣泄了出来。
      哪怕是在受伤下场的情况下，赤木依然拿到了全场最高分。
      不敢想象要是赤木正常打满全场，他能拿到多少分。
      而在受伤后赤木所展现出来的斗志，更是令人肃然起敬。
      比赛最后时刻，赤木吃阿牧假动作起跳，在忍受剧烈疼痛的情况下，
      他竟然能连续起跳，成功干扰阿牧的射篮，紧接着还能抢下防守篮板。
      这份意志力，让场边的晴子掩面痛哭，鱼住更是忍不住呐喊助威。
      其实安西早在下半场还有18分钟的时候，看出赤木可能撑不下去，让木暮去热身。
      结果他愣是撑到了最后一秒。
      就像安西说的，赤木的精神已经超越肉体极限了。
      就凭这份意志和完美的数据，赤木当之无愧给到一个"夯"。

  - index: 3
    name: "高砂"
    keywords: "Hanamichi Sakuragi Slam Dunk basketball center opponent"
    tier: "npc"
    text: |
      说完赤木，接下来聊聊和他对位的高砂。数据6分。
      相比起斗志高昂的大猩猩，这只小猩猩就显得有些唯唯诺诺了。
      面对脚伤严重的赤木，高砂防不住就算了，教练高头让他硬闯，
      他却连跟赤木正面PK的勇气都没有，气得高头破口大骂。
      阿牧无奈只能让他去盯樱木，自己这个控卫来防赤木。
      作为海南的正选中锋，高砂的篮板也被爆得不要不要的，整场比赛几乎毫无存在感。
      也就是最后几秒，有个还算亮眼的卡位，以及靠着长相莫名其妙拿到了关键球。
      勉勉强强给个NPC吧。
      最后强调一点，垫脚赤木的是阿牧不是他。注意看鞋子和腿的肤色，
      觉得是高砂的，是因为动画中间给他切了个镜头所造成的误导，别再冤枉他了。

  - index: 4
    name: "流川枫"
    keywords: "Kaede Rukawa basketball anime Slam Dunk shooting guard"
    tier: "top"
    text: |
      再来是新人王流川，31分、5板、5助攻、3盖帽。
      本场比赛，流川枫展现了强大的攻防能力，
      尤其是赤木受伤下场期间，流川仿佛化身"神明"，
      硬是靠着个人能力，帮助湘北抹平了11分的分差。
      海南几乎倾尽所有，就是没法挡住他。
      光上半场流川就拿了25分，气得高头把他的宝贝扇子都折断了。
      如果只看半场球，流川肯定夯爆了。
      只可惜这种爆种打法，没有超人般的体力根本没法延续。
      下半场流川仅得到6分，在湘北最需要他的时候倒下了。
      赛后他也承认，比赛失利自己有一定责任。
      综合来看可以给到顶级到夯之间。

  - index: 5
    name: "清田信长"
    keywords: "Nobunaga Kiyota basketball anime Slam Dunk small forward"
    tier: "rsr"
    text: |
      接着聊和他对位的清田。数据18分。
      比赛刚开始的隔扣，清田给了不少人惊喜，然而随着流川爆发，
      清田被各种吊打，两人间的差距显而易见。
      好在他身上有股不服输的劲，加上其耐力惊人，
      下半场限制流川枫，清田功不可没。
      最后时刻敏锐察觉湘北战术，对三井进行的关键封盖，也是海南制胜的重要原因之一。
      因此野猴子可以给到个人上人。

  - index: 6
    name: "樱木花道"
    keywords: "Hanamichi Sakuragi Slam Dunk basketball power forward"
    tier: "top"
    text: |
      下面是红毛猴樱木，6分、17板、2助攻、2封盖。
      相比起翔阳战靠宫城助攻的2分，这次打海南樱木几乎凭自己，
      足足翻了3倍，已经跟高砂一样分数了，成长速度有目共睹。
      当然最厉害的还得是篮板球。
      17个篮板全场封王，其中还有好几次关键的前场篮板，逼得帝王牧只能亲自出手。
      全场三次犯规，全都犯在了樱木身上。
      只是莫名其妙被宫益限制，以及最后的误传失误，让樱木的评级有所下降。
      整体可以给到一个顶级。

  - index: 7
    name: "武藤"
    keywords: "Slam Dunk basketball anime power forward Kainan"
    tier: "la"
    text: |
      同样是大前锋，武藤的表现可就差远了，数据只有5分，比菜鸟樱木还少。
      要知道这还是给了他放投机会的情况下，整场比赛几乎隐形，不是被盖就是传球失误。
      有人说武藤完美限制了三井，被误导了。
      他只有阿神不在的9分钟左右，才是跟三井对位，其它时候防三井的都是阿神。
      而且这几分钟，三井本就没什么球权，防守压力并不大。
      无论攻防两端，武藤的贡献微乎其微，只能给到一个拉完了。

  - index: 8
    name: "三井寿"
    keywords: "Hisashi Mitsui Slam Dunk basketball shooting guard three-pointer"
    tier: "npc"
    text: |
      接下来是社会我三哥，8分、2板、6助攻。
      本场比赛三井的得分排在湘北正选倒数第二，仅比樱木多了两分，这个数据显然非常不理想。
      归根结底是被阿神算计了。在之前几次的观察中，阿神就发现三井跟他很像，属于越投越有的类型。
      因此他的防守策略主要就是防投。
      你突破不要紧，反正内线有其它人协防，但初期一定不能让你找到投篮节奏。
      这也就是为什么比赛中后段，三井好几次空位都投不进的原因。
      鉴于个人情怀，我勉强给到三哥一个NPC，当然你给他拉我也觉得没什么大毛病。

  - index: 9
    name: "神"
    keywords: "Jin Slam Dunk basketball anime Kainan point guard"
    tier: "top"
    text: |
      相较而言，阿神的表现就好多了。数据22分，海南第二，其中绝大部分都来自下半场。
      凭借对射手深刻的理解能力，阿神给三井制定的防守策略非常奏效。
      而在进攻端他时常给出妙传，并且没有浪费任何一次出手机会，这一点确实很"神"。
      可惜运动能力不及樱木，即便形成突破，还是遭到了逆天大帽。
      整体可以给到一个顶级。

  - index: 10
    name: "宫城良田"
    keywords: "Ryota Miyagi Slam Dunk basketball point guard"
    tier: "top"
    text: |
      下面是五虎最后一位宫城，10分，16次助攻，湘北唯二拿到两双的球员。
      不仅助攻数据非常亮眼，能在跟阿牧的对位中拿到10分，已经超越了平日水准。
      另外井上没有统计抢断数据，本场比赛宫城有好几次精彩抢断，
      抢断高砂，更是强行为湘北续命。
      把这些都算上的话，宫城的数据可不比樱木差，他值得一个顶级。

  - index: 11
    name: "宫益义范"
    keywords: "Yoshinori Miyamasu Slam Dunk basketball bench player"
    tier: "rsr"
    text: |
      最后是两队替补。宫益义范，数据9分。
      不管符不符合现实，至少在漫画里，宫益的确克制了樱木。
      他的三分球同样弹无虚发，属于绝对不能放空的存在。
      偶尔灵光一闪，还能贡献几记妙传。
      尽管本身的缺陷很明显——长得矮，运动能力差，
      但就凭他1米6的个头，敢给樱木放狠话的勇气，他就够得上一个"人上人"。

  - index: 12
    name: "木暮公延"
    keywords: "Kiminobu Kogure Slam Dunk basketball glasses bench player"
    tier: "la"
    text: |
      眼镜兄木暮相较而言，就显得黯淡太多了。
      上半场上场9分多钟，除了给清田贡献一个盖帽数据，对球队毫无建树。
      最后时刻临危受命，接替体能不济的流川。
      结果面对阿牧的霸王色霸气，只能勉强站稳，连动作都不敢做。
      唯一亮点也就一个飞身救球，但依旧无法掩盖本场拉胯的表现。

outro:
  text: "你有不同意见吗？我是猫叔，咱们下期视频再见。"
  audio: "audio/outro.mp3"
