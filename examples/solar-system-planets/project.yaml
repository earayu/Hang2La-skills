name: "solar-system-planets"
type: "tierlist"
topic: "太阳系九大行星，从夯到拉排名"
language: zh
resolution: "1920x1080"
fps: 24

tierlist:
  # Path is relative to the repo root (resolved by assemble-video skill)
  background: "skills/assemble-video/assets/tierlist_bg.png"
  label_width_ratio: 0.127

tiers:
  - id: "hang"
    label: "夯"
  - id: "top"
    label: "顶级"
  - id: "rsr"
    label: "人上人"
  - id: "npc"
    label: "NPC"
  - id: "la"
    label: "拉完了"

style: "幽默犀利，互联网口语，多用类比和对比，偶尔夹杂科普小知识"

intro:
  text: |
    太阳系九大行星，从"夯"到"拉"排名来了。
    包括被开除球籍的冥王星，咱们今天一视同仁，通通点评一遍。
    评判标准嘛，颜值、体格、特技、居住价值，四合一综合打分。
    话不多说，开始！
  audio: "audio/intro.mp3"
  duration: 17.74

contestants:
  - index: 1
    name: "木星"
    keywords: "木星 Jupiter 太阳系"
    tier: "hang"
    image: "materials/contestant_01/photo_03.jpg"
    audio: "audio/contestant_01.mp3"
    duration: 41.51
    text: |
      第一位登场的，是太阳系的霸主——木星。
      体积是地球的1300多倍，质量是其他七颗行星加起来的两倍还多。
      这是什么概念？你站在太阳系里，木星就是那种开着豪车、占了三个停车位的大哥，其他行星只能夹缝求生。
      更绝的是，木星有个大红斑，一场持续了超过300年的超级风暴。
      人类的台风来了又去，它的风暴比地球还大，愣是刮了几百年没停。
      在防御上，木星也是太阳系的守门员，它的引力把大量小行星和彗星吸走，帮地球挡了无数次灾难性撞击，真正的老大哥担当。
      不给夯给谁？

  - index: 2
    name: "土星"
    keywords: "土星 Saturn 行星环"
    tier: "top"
    image: "materials/contestant_02/photo_02.jpg"
    audio: "audio/contestant_02.mp3"
    duration: 42.24
    text: |
      接下来是土星，太阳系最会打扮自己的行星。
      那一圈行星环，就是宇宙级别的时尚单品，其他行星你学得会吗？
      这个环不是一圈实心的，而是由无数冰块和岩石碎片组成的，厚度薄到只有几十米，但宽度却有几十万公里。
      就好比把一张A4纸铺开，大小跟北京到纽约一样宽，这精致程度堪称宇宙奇迹。
      土星本体也不含糊，是太阳系第二大行星，有82颗卫星，比公司里的大领导手下人还多。
      其中土卫六还有厚厚的大气层，科学家认为极有可能存在生命。
      颜值担当加实力派，顶级没跑。

  - index: 3
    name: "地球"
    keywords: "地球 Earth 太空视角"
    tier: "top"
    image: "materials/contestant_03/photo_00.jpg"
    audio: "audio/contestant_03.mp3"
    duration: 40.31
    text: |
      然后是咱们的老家——地球，宇宙中目前已知唯一有生命的星球。
      大气层、液态水、磁场、板块运动，四个条件缺一不可，地球全都有，这运气是彩票大奖级别的。
      从太空看地球，蓝白相间，人称"蓝色弹珠"，颜值在行星里绝对前三。
      而且距离太阳不远不近，处在"宜居带"的黄金位置，温度刚好适合生命存活。
      唯一的问题嘛，就是住在上面的某种生物，正在努力把它折腾坏。
      不过地球本身绝对是顶级实力，给个顶级，实至名归。

  - index: 4
    name: "火星"
    keywords: "火星 Mars 红色星球"
    tier: "rsr"
    image: "materials/contestant_04/photo_01.png"
    audio: "audio/contestant_04.mp3"
    duration: 44.96
    text: |
      接下来是火星，人类目前最想搬过去的邻居。
      虽然现在又冷又干，大气稀薄，但火星上有证据显示曾经存在过液态水，说明它以前也风光过，只是走了下坡路。
      颜值上，一身赤红色，沙尘暴一刮就是几个月，整个星球都是土，却莫名有种末日美学。
      更重要的是，火星是目前人类最有可能实现移民的星球，马斯克天天挂嘴边，说明它确实有两把刷子。
      奥林匹斯山，太阳系最高的山，比珠穆朗玛峰高三倍，放这里就是个噱头，但确实够猛。
      综合来看，潜力股一枚，人上人没问题。

  - index: 5
    name: "金星"
    keywords: "金星 Venus 行星"
    tier: "rsr"
    image: "materials/contestant_05/photo_03.jpg"
    audio: "audio/contestant_05.mp3"
    duration: 42.06
    text: |
      再来看金星，夜空中最亮的那颗星，没错，不是北极星，是金星。
      亮是真的亮，毕竟被厚达90倍大气压的浓硫酸云层包裹，反光能力一流。
      但这地方去了你就别想活，表面温度高达460度，不分昼夜，比水星还热。
      更奇葩的是，金星自转方向和其他行星相反，是个逆行星，而且转一圈要243个地球日，比它公转一年还长。
      也就是说在金星上，一天比一年还长。
      所以说金星颜值在线，本质是个"美丽的毒蘑菇"，只能远观，绝对不能亵玩。
      勉强给个人上人，主要靠颜值加分。

  - index: 6
    name: "天王星"
    keywords: "天王星 Uranus 蓝绿色行星"
    tier: "npc"
    image: "materials/contestant_06/photo_04.jpg"
    audio: "audio/contestant_06.mp3"
    duration: 42.63
    text: |
      然后是天王星，这位是太阳系里躺得最彻底的行星。
      自转轴倾斜了97度，也就是说它是横着躺在轨道上转的。
      这就像一个人走路不用腿，用脑袋滚过去，属于太阳系独一份的怪异体质。
      颜色是蓝绿色，看起来还行，但这蓝不是海洋的蓝，是甲烷气体的蓝，闻起来一股臭鸡蛋味。
      科学家探测了半天，发现它内部的热量莫名其妙消失了，连自己的热都散不出来，是太阳系最冷的行星之一。
      没什么高光时刻，存在感极低，NASA只派了旅行者2号路过了一次就再没去过。
      标准NPC，给个NPC就不错了。

  - index: 7
    name: "海王星"
    keywords: "海王星 Neptune 蓝色行星"
    tier: "npc"
    image: "materials/contestant_07/photo_04.jpg"
    audio: "audio/contestant_07.mp3"
    duration: 40.72
    text: |
      接下来是海王星，太阳系最远的行星，也是最被遗忘的那个。
      从太阳到海王星，光都要走4个多小时，距离远得让人绝望。
      旅行者2号1989年飞过去拍了一眼，到现在也没有第二艘飞船专门去拜访它，就这待遇。
      不过海王星也有硬货，风速最快，超过2000公里每小时，比地球上的任何台风都猛得多。
      而且它的大蓝斑，跟木星大红斑有得一比，也是个巨型风暴系统。
      颜色是漂亮的深蓝色，视觉上比天王星耐看多了。
      综合来说，就是个遥远的、无人关注的优等生，也就NPC的命。

  - index: 8
    name: "水星"
    keywords: "水星 Mercury 行星"
    tier: "la"
    image: "materials/contestant_08/photo_00.jpg"
    audio: "audio/contestant_08.mp3"
    duration: 43.13
    text: |
      倒数第二，水星登场，别看名字带个"水"，上面一滴水都没有。
      它是太阳系最小的行星，也是离太阳最近的行星，但这两点组合在一起，带来的全是坏处。
      白天温度高达430度，能把铅直接烤化，晚上又跌到零下180度，温差堪称太阳系之最。
      这极端温差的原因，就是它几乎没有大气层，留不住热量，什么都留不住。
      长相也就普通陨石坑水准，坑坑洼洼，跟月球撞脸，毫无特色。
      更惨的是，它公转速度极快，却转得极慢，一年只有88天，一天却有59年。
      总结：又小、又丑、又极端，活该拉完了。

  - index: 9
    name: "冥王星"
    keywords: "冥王星 Pluto 矮行星"
    tier: "la"
    image: "materials/contestant_09/photo_02.jpg"
    audio: "audio/contestant_09.mp3"
    duration: 45.87
    text: |
      最后压轴出场的，是我们的老朋友——冥王星。
      2006年，国际天文联合会开会，把冥王星的行星资格给撤了，降级为"矮行星"。
      想象一下，你上班几十年，突然有一天公司开会宣布你不是员工了，你是实习生，这就是冥王星的遭遇。
      它太小了，比月球还小，引力不够清空自己轨道上的其他天体，这是被踢出局的直接原因。
      长途跋涉距离太阳60亿公里，气温零下230度，就是个被遗忘在角落的小冰球。
      当然，新视野号探测器飞过去拍的照片，显示它表面有个心形的地貌，冥王星：我虽然拉，但我有爱心。
      不好意思，有没有爱心都改变不了被除名的结局，拉完了。

outro:
  text: "你有不同意见吗？欢迎在评论区开骂，咱们下期再见。"
  audio: "audio/outro.mp3"
  duration: 5.43
